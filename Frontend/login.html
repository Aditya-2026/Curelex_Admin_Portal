<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Curelex Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            height: 60px;
            margin: 0 auto 25px auto;
            display: block;
            object-fit: contain;
        }
        .login-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #1e293b;
        }
        .login-subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }
        .login-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .login-input:focus {
            outline: none;
            border-color: #2563eb;
        }
        .login-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #1d4ed8;
        }
        .error-msg {
            color: #dc2626;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="assets/curelex-logo.png" alt="Curelex Logo" class="login-logo">
        <div class="login-title">Admin Portal</div>
        <div class="login-subtitle">Sign in to access the dashboard</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" class="login-input" placeholder="admin@curelex.com" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="login-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            <div id="errorMsg" class="error-msg">Invalid email or password.</div>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
